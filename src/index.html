<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amaranth Check - Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h2>Settings</h2>

    <div class="tabs">
      <button class="tab active" data-tab="account">Account</button>
      <button class="tab" data-tab="appearance">Appearance</button>
      <button class="tab" data-tab="general">General</button>
    </div>

    <!-- Account Tab -->
    <div class="tab-content active" id="tab-account">
      <div class="field">
        <label>Company Code</label>
        <input type="text" id="company" />
      </div>
      <div class="field">
        <label>User ID</label>
        <input type="text" id="userId" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" />
      </div>
    </div>

    <!-- Appearance Tab -->
    <div class="tab-content" id="tab-appearance">
      <div class="field">
        <label>Remaining Label</label>
        <input type="text" id="labelLeft" />
      </div>
      <div class="field">
        <label>Done Label</label>
        <input type="text" id="labelDone" />
      </div>
      <div class="field">
        <label>Done Emoji</label>
        <div class="emoji-picker">
          <span class="emoji-preview" id="emojiPreview"></span>
          <button class="btn" id="btnEmojiChange">Change</button>
        </div>
        <div class="emoji-grid hidden" id="emojiGrid">
          <div class="emoji-presets" id="emojiPresets"></div>
          <div class="emoji-custom">
            <label>Custom:</label>
            <input type="text" id="emojiCustom" placeholder="Paste emoji" />
            <button class="btn" id="btnEmojiOk">OK</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Time Format</label>
        <select id="timeFormat">
          <option value="hm">8h32m</option>
          <option value="m">512m</option>
          <option value="colon">8:32</option>
        </select>
      </div>
      <div class="field checkbox">
        <label>
          <input type="checkbox" id="showProgressBar" />
          Show Progress Bar
        </label>
      </div>

      <div class="section-title">Time Colors</div>
      <div class="color-grid">
        <div class="color-header"></div>
        <div class="color-header">Early</div>
        <div class="color-header">Mid</div>
        <div class="color-header">Late</div>
        <div class="color-header">Done</div>
        <div class="color-label">Light</div>
        <input type="color" id="colorEarly" />
        <input type="color" id="colorMid" />
        <input type="color" id="colorLate" />
        <input type="color" id="colorDone" />
        <div class="color-label">Dark</div>
        <input type="color" id="colorEarlyDark" />
        <input type="color" id="colorMidDark" />
        <input type="color" id="colorLateDark" />
        <input type="color" id="colorDoneDark" />
      </div>
    </div>

    <!-- General Tab -->
    <div class="tab-content" id="tab-general">
      <div class="field checkbox">
        <label>
          <input type="checkbox" id="notifyOnDone" />
          Notify when done
        </label>
      </div>
      <div class="field checkbox">
        <label>
          <input type="checkbox" id="launchAtLogin" />
          Launch at Login
        </label>
      </div>

      <div class="section-title">Status</div>
      <div class="field">
        <button id="btnRefresh" class="btn">Refresh Now</button>
      </div>
      <div class="status-box" id="statusBox"></div>

      <div class="section-title">Troubleshooting</div>
      <div class="field">
        <button id="btnDebug" class="btn">Copy Debug Info</button>
        <span class="hint" id="debugHint">Paste to Slack for support</span>
      </div>
    </div>

    <div class="actions">
      <button id="btnSave" class="btn primary">Save</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
