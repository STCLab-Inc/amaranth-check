name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Build Swift
        working-directory: macos
        run: swift build -c release

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Tauri
        working-directory: windows/src-tauri
        run: cargo build --release
