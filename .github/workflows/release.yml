name: Release macOS

on:
  push:
    tags: ["macos-v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#macos-v}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: macos
        run: |
          echo 'let appVersion = "${{ steps.version.outputs.VERSION }}"' > Sources/AmaranthCheck/Version.swift
          swift build -c release

      - name: Package
        id: package
        working-directory: macos
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cp .build/release/amaranth-check .
          tar czf "amaranth-check-${VERSION}-arm64.tar.gz" amaranth-check
          SHA256=$(shasum -a 256 "amaranth-check-${VERSION}-arm64.tar.gz" | awk '{print $1}')
          echo "SHA256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "ASSET=macos/amaranth-check-${VERSION}-arm64.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname --list 'macos-v*' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --format="• %s" "$PREV_TAG".."${{ github.ref_name }}" -- macos/ scripts/ | grep -v "^• Merge")
          else
            COMMITS=$(git log --format="• %s" "${{ github.ref_name }}" -- macos/ scripts/ | head -20 | grep -v "^• Merge")
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "COMMITS<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
          SLACK_COMMITS=$(echo "$COMMITS" | tr '\n' '§' | sed 's/§/\\n/g')
          echo "SLACK_COMMITS=$SLACK_COMMITS" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.package.outputs.ASSET }}" \
            --title "macOS ${{ steps.version.outputs.VERSION }}" \
            --notes "${{ steps.notes.outputs.COMMITS }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch homebrew-stclab cask update
        run: |
          gh api repos/STCLab-Inc/homebrew-stclab/dispatches \
            -f event_type=update-cask \
            -f "client_payload[version]=${{ steps.version.outputs.VERSION }}" \
            -f "client_payload[sha256]=${{ steps.package.outputs.SHA256 }}"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_PAT }}

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "*amaranth-check macOS ${{ steps.version.outputs.VERSION }}* released\n\n${{ steps.notes.outputs.SLACK_COMMITS }}\n\n<${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}|View Release>\n\n`brew update && brew upgrade amaranth-check`"
            }
