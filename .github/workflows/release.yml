name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          echo 'let appVersion = "${{ steps.version.outputs.VERSION }}"' > Sources/AmaranthCheck/Version.swift
          swift build -c release

      - name: Package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cp .build/release/amaranth-check .
          tar czf "amaranth-check-${VERSION}-arm64.tar.gz" amaranth-check
          SHA256=$(shasum -a 256 "amaranth-check-${VERSION}-arm64.tar.gz" | awk '{print $1}')
          echo "SHA256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "ASSET=amaranth-check-${VERSION}-arm64.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --format="• %s" "$PREV_TAG".."${{ github.ref_name }}" -- | grep -v "^• Merge")
          else
            COMMITS=$(git log --format="• %s" "${{ github.ref_name }}" -- | head -20 | grep -v "^• Merge")
          fi
          # For GitHub Release (multiline)
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "COMMITS<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
          # For Slack (escaped newlines for JSON)
          SLACK_COMMITS=$(echo "$COMMITS" | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "SLACK_COMMITS=$SLACK_COMMITS" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.package.outputs.ASSET }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.COMMITS }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch homebrew-stclab cask update
        run: |
          gh api repos/STCLab-Inc/homebrew-stclab/dispatches \
            -f event_type=update-cask \
            -f "client_payload[version]=${{ steps.version.outputs.VERSION }}" \
            -f "client_payload[sha256]=${{ steps.package.outputs.SHA256 }}"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_PAT }}

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "*amaranth-check ${{ github.ref_name }}* released\n\n${{ steps.notes.outputs.SLACK_COMMITS }}\n\n<${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}|View Release>\n\n`brew update && brew upgrade amaranth-check`"
            }

  release-windows:
    runs-on: windows-latest
    needs: release-mac
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Windows
        working-directory: windows/src-tauri
        run: cargo build --release

      - name: Package
        id: package
        shell: bash
        working-directory: windows
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cp src-tauri/target/release/amaranth-check-win.exe "amaranth-check-${VERSION}-windows-x64.exe"
          echo "ASSET=amaranth-check-${VERSION}-windows-x64.exe" >> "$GITHUB_OUTPUT"

      - name: Upload to existing release
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            "windows/${{ steps.package.outputs.ASSET }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
